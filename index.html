<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AWS構成理解トレーナー（たたき台）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Architecture Learning Playground</p>
        <h1>AWS構成理解トレーナー</h1>
        <p class="hero-copy">
          構成図を見て「なぜこのリソースを使うか」を選択式で答える練習用たたき台です。
          面接・業務説明で必要な説明力の土台づくりを目的にしています。
        </p>
      </header>

      <section class="panel scenario-panel">
        <h2>1. 構成図を選ぶ</h2>
        <div id="scenarioButtons" class="scenario-buttons"></div>
      </section>

      <section class="panel diagram-panel">
        <div class="panel-title-row">
          <h2 id="scenarioTitle">構成図</h2>
          <span id="questionCounter" class="counter">0 / 0</span>
        </div>
        <p id="scenarioDescription" class="scenario-description"></p>
        <div id="diagramCanvas" class="diagram-canvas" aria-live="polite"></div>
      </section>

      <section class="panel quiz-panel">
        <h2>2. 問いに答える</h2>
        <p id="questionText" class="question-text"></p>
        <div id="options" class="options"></div>

        <div class="actions">
          <button id="submitBtn" class="btn btn-primary">解答する</button>
          <button id="nextBtn" class="btn btn-secondary" disabled>次の問題へ</button>
        </div>

        <div id="feedback" class="feedback" aria-live="polite"></div>
      </section>

      <section class="panel score-panel">
        <h2>3. スコア</h2>
        <p id="scoreText">正解数: 0 / 0</p>
        <button id="resetBtn" class="btn btn-ghost">この構成図を最初からやり直す</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
